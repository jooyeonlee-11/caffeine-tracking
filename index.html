<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>카페인 기록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Noto+Serif+KR:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f3ebe2;
      --bg-deep: #e5d9cc;
      --surface: #faf6f0;
      --surface-raised: #fffdf9;
      --border: #d5c9b8;
      --text: #3d3834;
      --muted: #6b6560;
      --accent: #8b6f56;
      --accent-dim: #6e5744;
      --mocha: #7a6352;
      --mocha-deep: #5c4a3d;
      --danger: #9a5f5f;
      --radius: 12px;
      --font: "Cormorant Garamond", "Noto Serif KR", "Apple SD Gothic Neo", "Batang", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(165deg, var(--surface-raised) 0%, var(--bg) 42%, var(--bg-deep) 100%);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 18px 48px;
    }

    h1, h2, h3 {
      font-weight: 600;
      color: var(--text);
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 18px;
      letter-spacing: 0.03em;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      padding: 4px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .tabs button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tabs button:hover {
      color: var(--text);
    }

    .tabs button.active {
      background: var(--mocha);
      color: var(--surface-raised);
      box-shadow: 0 1px 3px rgba(92, 74, 61, 0.12);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.65) inset, 0 2px 12px rgba(92, 74, 61, 0.06);
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px;
    }

    .card-head h2 {
      font-size: 1.05rem;
      margin: 0;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .drink-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }

    .drink-icon--loom {
      overflow: visible;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-title .drink-icon {
      width: 32px;
      height: 32px;
    }

    .log-item-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .log-item-head .drink-icon {
      width: 22px;
      height: 22px;
      margin-top: 1px;
      flex-shrink: 0;
    }


    .log-item-body {
      flex: 1;
      min-width: 0;
    }

    .chart-legend-icons {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .chart-legend-icons span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chart-legend-icons .drink-icon {
      width: 18px;
      height: 18px;
    }


    label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="number"],
    input[type="datetime-local"],
    textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--text);
      font: inherit;
      margin-bottom: 14px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(139, 111, 86, 0.18);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-save-coffee,
    .btn-save-other {
      background: var(--mocha);
      color: var(--surface-raised);
      letter-spacing: 0.02em;
      box-shadow: 0 1px 2px rgba(92, 74, 61, 0.15);
    }

    .btn-save-coffee:hover,
    .btn-save-other:hover {
      background: var(--accent-dim);
    }

    .btn-with-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-with-icon .drink-icon {
      width: 20px;
      height: 20px;
    }

    .btn-save-coffee .drink-icon,
    .btn-save-other .drink-icon {
      opacity: 0.92;
      filter: brightness(1.08) saturate(0.9);
    }

    .view-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .view-toolbar button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .view-toolbar button.active {
      border-color: var(--mocha);
      color: var(--text);
      background: rgba(139, 111, 86, 0.1);
    }

    .stat-box {
      text-align: center;
      padding: 20px;
      background: linear-gradient(145deg, var(--surface-raised) 0%, rgba(229, 217, 204, 0.55) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 18px;
      box-shadow: 0 2px 10px rgba(92, 74, 61, 0.05);
    }

    .stat-box .value {
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .stat-box .unit {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .stat-box .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 10px;
      opacity: 0.85;
    }

    .chart-wrap {
      position: relative;
      height: 260px;
      margin-top: 8px;
    }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      padding: 32px 16px;
      font-size: 0.92rem;
    }

    .log-list {
      margin-top: 20px;
    }

    .log-list h3 {
      font-size: 0.95rem;
      color: var(--text);
      margin: 0 0 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .log-item {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      margin-bottom: 8px;
      font-size: 0.88rem;
      background: var(--surface-raised);
      color: var(--text);
    }

    .log-item .meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 6px;
    }

    .log-item .reason {
      margin-top: 8px;
      color: var(--muted);
    }

    .log-item button.delete {
      margin-top: 10px;
      padding: 6px 12px;
      font-size: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--danger);
      background: transparent;
      color: var(--danger);
      cursor: pointer;
    }

    /* 위(胃) 동기부여 시각화 */
    .stomach-viz {
      margin-bottom: 18px;
      padding: 18px 16px 16px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      box-shadow: 0 2px 12px rgba(92, 74, 61, 0.06);
    }

    .stomach-viz h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }

    .stomach-svg-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 168px;
      filter: drop-shadow(0 6px 14px rgba(92, 74, 61, 0.12));
    }

    .stomach-svg {
      width: 100%;
      max-width: 200px;
      height: auto;
      vertical-align: middle;
    }

    .stomach-caption {
      margin: 14px 0 0;
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .stomach-caption strong {
      color: var(--text);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1 class="app-title">
      <svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-coffee" /></svg>
      카페인 기록
    </h1>

    <nav class="tabs" role="tablist">
      <button type="button" class="active" data-tab="record" role="tab" aria-selected="true">기록</button>
      <button type="button" data-tab="view" role="tab" aria-selected="false">보기</button>
    </nav>

    <!-- 기록 -->
    <section id="panel-record" class="panel active" role="tabpanel">
      <div class="card coffee">
        <div class="card-head">
          <svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-coffee" /></svg>
          <h2>커피</h2>
        </div>
        <label for="coffee-cups">잔 수</label>
        <input id="coffee-cups" type="number" min="0.25" step="0.25" value="1" />

        <label for="coffee-time">마신 시각</label>
        <input id="coffee-time" type="datetime-local" />

        <label for="coffee-reason">왜 마셨는지</label>
        <textarea id="coffee-reason" placeholder="예: 오후 집중이 필요해서"></textarea>

        <button type="button" class="btn btn-save-coffee btn-with-icon" id="save-coffee">
          <svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-coffee" /></svg>
          커피 기록 저장
        </button>
      </div>

      <div class="card other">
        <div class="card-head">
          <svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-drink-other" /></svg>
          <h2>커피 외 음료</h2>
        </div>
        <label for="other-cups">잔 수</label>
        <input id="other-cups" type="number" min="0.25" step="0.25" value="1" />

        <label for="other-time">마신 시각</label>
        <input id="other-time" type="datetime-local" />

        <button type="button" class="btn btn-save-other btn-with-icon" id="save-other">
          <svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-drink-other" /></svg>
          음료 기록 저장
        </button>
      </div>
    </section>

    <!-- 보기 -->
    <section id="panel-view" class="panel" role="tabpanel">
      <div class="stat-box">
        <div class="value" id="week-caffeine-mg">0</div>
        <div class="unit">이번 주 카페인 총량 (mg)</div>
        <div class="hint">기준: 아메리카노 1잔 ≈ 95mg (일반적인 한 잔 기준)</div>
      </div>

      <div class="stomach-viz">
        <h2>이번 주, 위 속 커피</h2>
        <div class="stomach-svg-wrap">
          <svg
            class="stomach-svg"
            viewBox="0 0 200 260"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <defs>
              <!-- 3D 아이콘 참고: 식도(좌상) → 우만·위체가 오른쪽으로 크게 볼록 → 큰굽이(우·하) → 유문 훅(좌하) → 작은굽이(좌연) -->
              <path
                id="stomach-silhouette"
                d="M 64 9
                   L 74 6.5
                   L 78 36
                   C 128 24 182 44 192 88
                   C 204 132 198 186 166 218
                   C 138 242 96 258 54 248
                   C 26 240 6 210 6 172
                   C 6 128 28 88 56 60
                   C 60 52 62 42 62 34
                   L 62 34
                   L 64 9
                   Z"
              />
              <clipPath id="stomach-clip">
                <use href="#stomach-silhouette" />
              </clipPath>
              <!-- 조명 우상단: 하이라이트 · 좌하·안쪽 J 곡선 음영 -->
              <radialGradient id="stomach-3d-main" cx="72%" cy="22%" r="78%" fx="68%" fy="18%">
                <stop offset="0%" stop-color="#ffb5b5" />
                <stop offset="38%" stop-color="#ff6b6b" />
                <stop offset="72%" stop-color="#e85555" />
                <stop offset="100%" stop-color="#9a3838" />
              </radialGradient>
              <linearGradient id="stomach-3d-shadow" x1="8%" y1="92%" x2="88%" y2="12%">
                <stop offset="0%" stop-color="#6a2929" stop-opacity="0.45" />
                <stop offset="42%" stop-color="#ff6b6b" stop-opacity="0" />
              </linearGradient>
              <linearGradient id="stomach-inner-hook" x1="18%" y1="55%" x2="52%" y2="48%">
                <stop offset="0%" stop-color="#5c2024" stop-opacity="0.28" />
                <stop offset="55%" stop-color="#ff6b6b" stop-opacity="0" />
              </linearGradient>
              <!-- 탁한 갈색(7일 20잔에서 완전 표시): 채도 낮은 커피·진흙 톤 -->
              <radialGradient id="stomach-brown-3d-main" cx="72%" cy="22%" r="78%" fx="68%" fy="18%">
                <stop offset="0%" stop-color="#9a8f84" />
                <stop offset="38%" stop-color="#6e5c4d" />
                <stop offset="72%" stop-color="#4a3d34" />
                <stop offset="100%" stop-color="#2e2420" />
              </radialGradient>
              <linearGradient id="stomach-brown-3d-shadow" x1="8%" y1="92%" x2="88%" y2="12%">
                <stop offset="0%" stop-color="#1a100c" stop-opacity="0.5" />
                <stop offset="42%" stop-color="#4a3d34" stop-opacity="0" />
              </linearGradient>
              <linearGradient id="stomach-brown-inner-hook" x1="18%" y1="55%" x2="52%" y2="48%">
                <stop offset="0%" stop-color="#1a1410" stop-opacity="0.32" />
                <stop offset="55%" stop-color="#6e5c4d" stop-opacity="0" />
              </linearGradient>
            </defs>

            <g clip-path="url(#stomach-clip)">
              <g id="stomach-healthy-layer">
                <rect x="0" y="0" width="200" height="260" fill="url(#stomach-3d-main)" />
                <rect x="0" y="0" width="200" height="260" fill="url(#stomach-3d-shadow)" />
                <rect x="0" y="0" width="200" height="260" fill="url(#stomach-inner-hook)" />
              </g>
              <g id="stomach-brown-layer" opacity="0">
                <rect x="0" y="0" width="200" height="260" fill="url(#stomach-brown-3d-main)" />
                <rect x="0" y="0" width="200" height="260" fill="url(#stomach-brown-3d-shadow)" />
                <rect x="0" y="0" width="200" height="260" fill="url(#stomach-brown-inner-hook)" />
              </g>
            </g>
            <use
              href="#stomach-silhouette"
              fill="none"
              stroke="rgba(61, 56, 52, 0.14)"
              stroke-width="1.5"
              vector-effect="non-scaling-stroke"
            />
          </svg>
        </div>
        <p class="stomach-caption">
          이번 주 커피 <strong id="stomach-week-cups">0</strong>잔.
          <span id="stomach-msg">선홍빛 위는 아직 커피 얼룩이 거의 없어요.</span>
        </p>
      </div>

      <div class="view-toolbar">
        <button type="button" class="active" data-range="week">주간</button>
        <button type="button" data-range="month">월간</button>
      </div>

      <div class="card">
        <h2 style="margin-bottom:4px;color:var(--text);">잔 수 추이</h2>
        <p class="chart-legend-icons" style="margin:0 0 12px;font-size:0.82rem;color:var(--muted);">
          <span class="coffee-legend">
            <svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-coffee" /></svg>
            커피(막대)
          </span>
          <span class="other-legend">
            <svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-drink-other" /></svg>
            기타 음료(선)
          </span>
        </p>
        <div class="chart-wrap">
          <canvas id="chart-main"></canvas>
        </div>
        <p id="chart-empty" class="empty-msg" style="display:none;">아직 기록이 없습니다. 기록 탭에서 입력해 보세요.</p>
      </div>

      <div class="log-list">
        <h3>최근 기록</h3>
        <div id="recent-logs"></div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = "caffeine-tracker-v1";
      /** US FDA 등에서 자주 인용되는 일반 커피 1잔(약 237ml) 기준 카페인 약 95mg */
      const CAFFEINE_MG_PER_AMERICANO = 95;

      function loadEntries() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveEntries(entries) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      }

      function nowLocalDatetimeValue() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        const y = d.getFullYear();
        const m = pad(d.getMonth() + 1);
        const day = pad(d.getDate());
        const h = pad(d.getHours());
        const min = pad(d.getMinutes());
        return `${y}-${m}-${day}T${h}:${min}`;
      }

      function parseLocalInput(value) {
        if (!value) return new Date();
        const d = new Date(value);
        return isNaN(d.getTime()) ? new Date() : d;
      }

      function startOfWeek(d) {
        const x = new Date(d);
        const day = x.getDay();
        const diff = x.getDate() - day + (day === 0 ? -6 : 1);
        x.setDate(diff);
        x.setHours(0, 0, 0, 0);
        return x;
      }

      function startOfMonth(d) {
        const x = new Date(d);
        x.setDate(1);
        x.setHours(0, 0, 0, 0);
        return x;
      }

      function addDays(d, n) {
        const x = new Date(d);
        x.setDate(x.getDate() + n);
        return x;
      }

      function formatDayLabel(d) {
        const w = ["일", "월", "화", "수", "목", "금", "토"];
        return `${d.getMonth() + 1}/${d.getDate()}(${w[d.getDay()]})`;
      }

      function formatMonthDay(d) {
        return `${d.getMonth() + 1}/${d.getDate()}`;
      }

      let chartInstance = null;
      let viewRange = "week";

      function getWeekCoffeeCupsAndCaffeine() {
        const entries = loadEntries();
        const weekStart = startOfWeek(new Date());
        const weekEnd = addDays(weekStart, 7);
        let coffeeCups = 0;
        for (const e of entries) {
          if (e.type !== "coffee") continue;
          const t = new Date(e.time);
          if (t >= weekStart && t < weekEnd) {
            coffeeCups += Number(e.cups) || 0;
          }
        }
        const mg = Math.round(coffeeCups * CAFFEINE_MG_PER_AMERICANO);
        return { coffeeCups, mg };
      }

      function buildBuckets(range) {
        const entries = loadEntries();
        const now = new Date();
        let labels = [];
        let coffeeByBucket = [];
        let otherByBucket = [];
        let bucketStarts = [];

        if (range === "week") {
          const ws = startOfWeek(now);
          for (let i = 0; i < 7; i++) {
            const dayStart = addDays(ws, i);
            const dayEnd = addDays(dayStart, 1);
            bucketStarts.push(dayStart);
            labels.push(formatDayLabel(dayStart));
            let c = 0,
              o = 0;
            for (const e of entries) {
              const t = new Date(e.time);
              if (t >= dayStart && t < dayEnd) {
                if (e.type === "coffee") c += Number(e.cups) || 0;
                else if (e.type === "other") o += Number(e.cups) || 0;
              }
            }
            coffeeByBucket.push(c);
            otherByBucket.push(o);
          }
        } else {
          const ms = startOfMonth(now);
          const next = new Date(ms);
          next.setMonth(next.getMonth() + 1);
          const daysInMonth = Math.round((next - ms) / 86400000);
          for (let i = 0; i < daysInMonth; i++) {
            const dayStart = addDays(ms, i);
            const dayEnd = addDays(dayStart, 1);
            bucketStarts.push(dayStart);
            labels.push(formatMonthDay(dayStart));
            let c = 0,
              o = 0;
            for (const e of entries) {
              const t = new Date(e.time);
              if (t >= dayStart && t < dayEnd) {
                if (e.type === "coffee") c += Number(e.cups) || 0;
                else if (e.type === "other") o += Number(e.cups) || 0;
              }
            }
            coffeeByBucket.push(c);
            otherByBucket.push(o);
          }
        }

        return { labels, coffeeByBucket, otherByBucket, bucketStarts };
      }

      function renderChart() {
        const canvas = document.getElementById("chart-main");
        const emptyEl = document.getElementById("chart-empty");
        const { labels, coffeeByBucket, otherByBucket } = buildBuckets(viewRange);

        const hasData =
          coffeeByBucket.some((v) => v > 0) || otherByBucket.some((v) => v > 0);
        emptyEl.style.display = hasData ? "none" : "block";
        canvas.style.display = hasData ? "block" : "none";

        if (chartInstance) {
          chartInstance.destroy();
          chartInstance = null;
        }

        if (!hasData) return;

        chartInstance = new Chart(canvas, {
          type: "bar",
          data: {
            labels,
            datasets: [
              {
                type: "bar",
                label: "커피 (잔)",
                data: coffeeByBucket,
                backgroundColor: "rgba(139, 111, 86, 0.55)",
                borderColor: "rgba(110, 87, 68, 0.85)",
                borderWidth: 1,
                yAxisID: "y",
                order: 2,
              },
              {
                type: "line",
                label: "기타 음료 (잔)",
                data: otherByBucket,
                borderColor: "rgba(107, 101, 96, 0.9)",
                backgroundColor: "rgba(107, 101, 96, 0.12)",
                tension: 0.25,
                fill: false,
                yAxisID: "y",
                order: 1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: {
                labels: { color: "#6b6560", font: { family: "'Noto Serif KR', serif", size: 11 } },
              },
            },
            scales: {
              x: {
                ticks: {
                  color: "#6b6560",
                  maxRotation: viewRange === "month" ? 45 : 0,
                  font: { family: "'Noto Serif KR', serif", size: 10 },
                },
                grid: { color: "rgba(181, 168, 152, 0.45)" },
              },
              y: {
                beginAtZero: true,
                ticks: { color: "#6b6560", font: { family: "'Noto Serif KR', serif", size: 10 } },
                grid: { color: "rgba(181, 168, 152, 0.45)" },
              },
            },
          },
        });
      }

      function renderRecentLogs() {
        const container = document.getElementById("recent-logs");
        const entries = loadEntries().sort(
          (a, b) => new Date(b.time) - new Date(a.time)
        );
        const slice = entries.slice(0, 15);
        if (slice.length === 0) {
          container.innerHTML =
            '<p class="empty-msg" style="padding:16px;">저장된 기록이 없습니다.</p>';
          return;
        }

        container.innerHTML = slice
          .map((e) => {
            const t = new Date(e.time);
            const dateStr = t.toLocaleString("ko-KR", {
              dateStyle: "medium",
              timeStyle: "short",
            });
            if (e.type === "coffee") {
              const reason = (e.reason || "").trim();
              return `
            <div class="log-item coffee" data-id="${e.id}">
              <div class="log-item-head">
                ${ICON_COFFEE}
                <div class="log-item-body">
                  <strong>커피 ${e.cups}잔</strong> · ${dateStr}
                  ${reason ? `<div class="reason">${escapeHtml(reason)}</div>` : ""}
                  <button type="button" class="delete" data-id="${e.id}">삭제</button>
                </div>
              </div>
            </div>`;
            }
            return `
            <div class="log-item other" data-id="${e.id}">
              <div class="log-item-head">
                ${ICON_OTHER}
                <div class="log-item-body">
                  <strong>기타 음료 ${e.cups}잔</strong> · ${dateStr}
                  <button type="button" class="delete" data-id="${e.id}">삭제</button>
                </div>
              </div>
            </div>`;
          })
          .join("");
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      const ICON_COFFEE =
        '<svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-coffee"/></svg>';
      const ICON_OTHER =
        '<svg class="drink-icon drink-icon--loom" aria-hidden="true"><use href="#icon-drink-other"/></svg>';

      /** 이번 주(7일) 커피 잔 수: 20잔 이상이면 위가 완전히 탁한 갈색으로 보이도록 선형 매핑 */
      const WEEK_FULL_BROWN_CUPS = 20;

      function formatCupsDisplay(n) {
        if (n === 0) return "0";
        const rounded = Math.round(n * 4) / 4;
        return Number.isInteger(rounded)
          ? String(rounded)
          : String(rounded);
      }

      function updateStomachVisual() {
        const { coffeeCups } = getWeekCoffeeCupsAndCaffeine();
        const healthy = document.getElementById("stomach-healthy-layer");
        const brown = document.getElementById("stomach-brown-layer");
        const cupsEl = document.getElementById("stomach-week-cups");
        const msgEl = document.getElementById("stomach-msg");

        cupsEl.textContent = formatCupsDisplay(coffeeCups);

        const t = Math.min(1, coffeeCups / WEEK_FULL_BROWN_CUPS);
        const oHealthy = 1 - t;
        const oBrown = t;
        healthy.setAttribute("opacity", oHealthy.toFixed(4));
        brown.setAttribute("opacity", oBrown.toFixed(4));
        healthy.style.transition = "opacity 0.45s ease";
        brown.style.transition = "opacity 0.45s ease";

        let msg = "";
        if (coffeeCups <= 0) {
          msg = "선홍빛 위는 아직 갈색으로 거의 물들지 않았어요.";
        } else if (t < 0.2) {
          msg = "잔 수가 늘 때마다 탁한 갈색이 조금씩 스며들어요.";
        } else if (t < 0.45) {
          msg = "이번 주 누적만큼 위가 누런 갈색으로 바뀌고 있어요.";
        } else if (t < 0.75) {
          msg = "위 색이 꽤 탁한 갈색이에요. 한동안 줄여 보는 것도 좋아요.";
        } else if (t < 1) {
          msg = "거의 온통 탁한 갈색에 가깝습니다. 20잔 넘기 전에 호흡을 맞춰 봐요.";
        } else {
          msg = "이번 주 기준으로 위가 완전히 탁한 갈색으로 보여요. 물과 휴식도 챙겨요.";
        }
        msgEl.textContent = msg;
      }

      function updateWeekStat() {
        const { mg } = getWeekCoffeeCupsAndCaffeine();
        document.getElementById("week-caffeine-mg").textContent =
          mg.toLocaleString("ko-KR");
        updateStomachVisual();
      }

      function refreshView() {
        updateWeekStat();
        renderChart();
        renderRecentLogs();
      }

      // Tabs
      document.querySelectorAll(".tabs [data-tab]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const tab = btn.dataset.tab;
          document.querySelectorAll(".tabs [data-tab]").forEach((b) => {
            b.classList.toggle("active", b.dataset.tab === tab);
            b.setAttribute("aria-selected", b.dataset.tab === tab);
          });
          document.querySelectorAll(".panel").forEach((p) => {
            p.classList.toggle("active", p.id === "panel-" + tab);
          });
          if (tab === "view") refreshView();
        });
      });

      // Range
      document.querySelectorAll(".view-toolbar [data-range]").forEach((btn) => {
        btn.addEventListener("click", () => {
          viewRange = btn.dataset.range;
          document.querySelectorAll(".view-toolbar [data-range]").forEach((b) => {
            b.classList.toggle("active", b.dataset.range === viewRange);
          });
          renderChart();
        });
      });

      // Save coffee
      document.getElementById("save-coffee").addEventListener("click", () => {
        const cups = parseFloat(document.getElementById("coffee-cups").value);
        const timeVal = document.getElementById("coffee-time").value;
        const reason = document.getElementById("coffee-reason").value.trim();
        if (!cups || cups <= 0) {
          alert("커피 잔 수를 입력해 주세요.");
          return;
        }
        const entries = loadEntries();
        entries.push({
          id: crypto.randomUUID(),
          type: "coffee",
          cups,
          time: parseLocalInput(timeVal).toISOString(),
          reason: reason || "",
        });
        saveEntries(entries);
        document.getElementById("coffee-reason").value = "";
        alert("커피 기록을 저장했습니다.");
      });

      // Save other
      document.getElementById("save-other").addEventListener("click", () => {
        const cups = parseFloat(document.getElementById("other-cups").value);
        const timeVal = document.getElementById("other-time").value;
        if (!cups || cups <= 0) {
          alert("음료 잔 수를 입력해 주세요.");
          return;
        }
        const entries = loadEntries();
        entries.push({
          id: crypto.randomUUID(),
          type: "other",
          cups,
          time: parseLocalInput(timeVal).toISOString(),
        });
        saveEntries(entries);
        alert("음료 기록을 저장했습니다.");
      });

      // Delete
      document.getElementById("recent-logs").addEventListener("click", (ev) => {
        const target = ev.target;
        if (!target.classList.contains("delete")) return;
        const id = target.dataset.id;
        if (!id || !confirm("이 기록을 삭제할까요?")) return;
        const next = loadEntries().filter((e) => e.id !== id);
        saveEntries(next);
        refreshView();
      });

      // Init datetime defaults
      document.getElementById("coffee-time").value = nowLocalDatetimeValue();
      document.getElementById("other-time").value = nowLocalDatetimeValue();
    })();
  </script>
</body>
</html>
